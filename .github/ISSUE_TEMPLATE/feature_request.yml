name: Feature Request
description: Suggest a new feature or improvement
title: "[FEAT]: "
labels: ["feature"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Suggest a feature or improvement.

  - type: input
    id: summary
    attributes:
      label: Feature summary
      placeholder: Short description
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Use case
      placeholder: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
