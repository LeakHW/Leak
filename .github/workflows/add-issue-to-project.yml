name: Add issues to project

on:
  issues:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Add to GitHub Project
        uses: actions/add-to-project@v0.6.0
        with:
          project-url: https://github.com/orgs/LeakHW/projects/3
          github-token: ${{ secrets.GITHUB_TOKEN }}
